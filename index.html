<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Networking Flowchart</title>
<style>
body {
  font-family: 'Courier New', Courier, monospace;
  background: #e8e8e0;
  color: #222;
  font-size: 13px;
  line-height: 1.5;
  padding: 20px;
  margin: 0;
}

h1 {
  font-size: 1.3em;
  text-align: center;
  margin: 0 0 2px 0;
}

p.sub {
  text-align: center;
  font-size: 0.85em;
  color: #555;
  margin: 0 0 10px 0;
}

p.intro {
  max-width: 500px;
  margin: 16px auto;
  line-height: 1.6;
  text-align: center;
}

#box {
  max-width: 680px;
  margin: 0 auto;
}

/* Nodes */
.node {
  border: 2px solid #999;
  padding: 8px;
  margin-bottom: 4px;
  background: #f4f4ee;
  font-size: 0.92em;
}

.child {
  margin-left: 20px;
  border-left: 2px solid #999;
}

/* Active question: yellow */
.q-active {
  border-color: #000;
  background: #ffffcc;
}

/* Done question: green */
.q-done {
  border-color: #000;
  background: #d4edda;
  cursor: pointer;
}

/* Off path: faded */
.q-off {
  opacity: 0.3;
}

/* Active endpoint: orange */
.e-active {
  border-color: #000;
  background: #ffe0b2;
}

/* Modifier box */
.mod-active {
  border: 2px dashed #000;
  background: #fff8dc;
  padding: 8px;
  margin-bottom: 4px;
  font-size: 0.92em;
}

.mod-off {
  border: 2px dashed #999;
  background: #f0f0e0;
  padding: 8px;
  margin-bottom: 4px;
  font-size: 0.92em;
  opacity: 0.3;
}

/* Context tip under questions */
.ctx {
  font-size: 0.85em;
  color: #555;
  margin: 4px 0;
}

/* Buttons */
button.opt {
  font-family: 'Courier New', Courier, monospace;
  padding: 4px 12px;
  margin: 4px 4px 0 0;
  cursor: pointer;
  background: #ddd;
  border: 2px outset #eee;
  font-size: 0.92em;
}

button.opt:hover {
  background: #ccc;
}

button.opt:active {
  border-style: inset;
}

.picked {
  background: #666;
  color: #fff;
  border: 2px solid #333;
  cursor: default;
}

.goback {
  font-size: 0.75em;
  color: #555;
  margin-top: 2px;
}

.center {
  text-align: center;
  margin: 16px 0;
}

button.big {
  font-family: 'Courier New', Courier, monospace;
  font-size: 1.1em;
  padding: 10px 40px;
  cursor: pointer;
  background: #c0c0c0;
  border: 3px outset #ddd;
  margin-top: 20px;
}

button.big:hover {
  background: #b0b0a8;
}

button.big:active {
  border-style: inset;
}

button.nav {
  font-family: 'Courier New', Courier, monospace;
  padding: 4px 12px;
  cursor: pointer;
  background: #c0c0c0;
  border: 2px outset #ddd;
}

button.nav:hover {
  background: #b0b0a8;
}

button.nav:active {
  border-style: inset;
}
</style>
</head>
<body>

<h1>The Networking Flowchart</h1>
<p class="sub">An Interactive Guide to "Networking" / by Anto Park</p>
<div id="box"></div>

<script>
// ============================================================
// REFERENCE: B = the single output div. Every function writes
// to B.innerHTML with a complete HTML string for that state.
// ============================================================
var B = document.getElementById("box");

// Track which modifier is active (null, "m15", or "m16")
var activeMod = null;

// Track company size origin for question 9 routing
// "large", "mid", "small"
var companySize = null;


// ============================================================
// HELPER: scroll to active node after render
// ============================================================
function scrollToActive() {
  setTimeout(function() {
    var el = document.querySelector('.q-active') || document.querySelector('.e-active');
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 50);
}


// ============================================================
// HELPER: modifier HTML
// ============================================================
function modBox() {
  var m15 = "";
  var m16 = "";
  if (activeMod === "m15") {
    m15 = '<div class="mod-active"><b>Modifier: LinkedIn Feed</b><br>You found this job because someone at the company posted about it. Before anything else: you can comment thoughtfully on the post (do not just write "Interested!") or leave a like, then send a personalized connection request to the poster referencing the post. Then proceed with the recommendation below.</div>';
    m16 = '<div class="mod-off">Modifier: Event</div>';
  } else if (activeMod === "m16") {
    m15 = '<div class="mod-off">Modifier: LinkedIn Feed</div>';
    m16 = '<div class="mod-active"><b>Modifier: Event</b><br>You found this job at a career fair, networking event, or in person. Send a personalized follow up within 24 to 48 hours referencing something specific from your conversation. Connect on LinkedIn immediately. Then proceed with the recommendation below.</div>';
  } else {
    m15 = '<div class="mod-off">Modifier: LinkedIn Feed</div>';
    m16 = '<div class="mod-off">Modifier: Event</div>';
  }
  return m15 + m16;
}

function modBoxOff() {
  return '<div class="mod-off">Modifier: LinkedIn Feed</div><div class="mod-off">Modifier: Event</div>';
}


// ============================================================
// HELPER: off-path tree segments (collapsed, faded)
// ============================================================

// The full "no job" path, faded
function offPathB() {
  return '<div class="node q-off">Q30: Is there a specific company you are interested in?</div>'
    + '<div class="child">'
    + '<div class="node q-off">Q31: When would you like to work at this company?</div>'
    + '<div class="child">'
    + '<div class="node q-off">Q32: What is the company size?</div>'
    + '<div class="child"><div class="node q-off">END X</div><div class="node q-off">END Y</div><div class="node q-off">END Z</div></div>'
    + '<div class="node q-off">Q35: What is the company size?</div>'
    + '<div class="child"><div class="node q-off">END AA</div><div class="node q-off">END BB</div><div class="node q-off">END CC</div></div>'
    + '</div>'
    + '<div class="node q-off">Q40: What kind of networking are you looking for?</div>'
    + '<div class="child"><div class="node q-off">END DD</div><div class="node q-off">END EE</div><div class="node q-off">END FF</div><div class="node q-off">END GG</div><div class="node q-off">END HH</div></div>'
    + '</div>';
}

// The full "job" path, faded
function offPathA() {
  return '<div class="node q-off">Q4: How did you find this job posting?</div>'
    + '<div class="child">'
    + modBoxOff()
    + '<div class="node q-off">END C</div>'
    + '<div class="node q-off">Q5: What is the company size?</div>'
    + '<div class="child">'
    + offLargeCompany()
    + offMidCompany()
    + offSmallCompany()
    + '</div>'
    + '</div>';
}

function offLargeCompany() {
  return '<div class="node q-off">Q6: Do you know anyone at this large company?</div>'
    + '<div class="child">'
    + offWarmBranch()
    + offColdLarge()
    + '</div>';
}

function offMidCompany() {
  return '<div class="node q-off">Q7: Do you know anyone at this mid sized company?</div>'
    + '<div class="child">'
    + offWarmBranch()
    + offColdMid()
    + '</div>';
}

function offSmallCompany() {
  return '<div class="node q-off">Q8: Do you know anyone at this small company?</div>'
    + '<div class="child">'
    + offWarmBranch()
    + offColdSmall()
    + '</div>';
}

function offWarmBranch() {
  return '<div class="node q-off">Q9: Are you on good terms with this person?</div>'
    + '<div class="child">'
    + '<div class="node q-off">Q10: Can you get a referral within 1 to 2 days?</div>'
    + '<div class="child">'
    + '<div class="node q-off">END D</div>'
    + '<div class="node q-off">Q11: How recently was the job posted?</div>'
    + '<div class="child"><div class="node q-off">END E</div><div class="node q-off">END F</div></div>'
    + '</div>'
    + '</div>';
}

function offColdLarge() {
  return '<div class="node q-off">Q12: Who do you want to reach out to? (Large)</div>'
    + '<div class="child">'
    + offRecruiterBranch()
    + '<div class="node q-off">END G</div>'
    + '<div class="node q-off">END H</div>'
    + '<div class="node q-off">END I</div>'
    + '<div class="node q-off">END J</div>'
    + '</div>';
}

function offColdMid() {
  return '<div class="node q-off">Q13: Who do you want to reach out to? (Mid sized)</div>'
    + '<div class="child">'
    + offRecruiterBranch()
    + '<div class="node q-off">END K</div>'
    + '<div class="node q-off">END L</div>'
    + '<div class="node q-off">END M</div>'
    + '<div class="node q-off">END N</div>'
    + '</div>';
}

function offColdSmall() {
  return '<div class="node q-off">Q14: Who do you want to reach out to? (Small)</div>'
    + '<div class="child">'
    + '<div class="node q-off">END O</div>'
    + '<div class="node q-off">END P</div>'
    + '<div class="node q-off">END Q</div>'
    + '</div>';
}

function offRecruiterBranch() {
  return '<div class="node q-off">Q17: What kind of role are you looking for?</div>'
    + '<div class="child">'
    + '<div class="node q-off">Q18: Recruiter commonality?</div>'
    + '<div class="child">'
    + '<div class="node q-off">END R</div>'
    + '<div class="node q-off">END S</div>'
    + '<div class="node q-off">Q19: Is this recruiter active on LinkedIn?</div>'
    + '<div class="child"><div class="node q-off">END U</div><div class="node q-off">END V</div><div class="node q-off">END W</div></div>'
    + '<div class="node q-off">END T</div>'
    + '</div>'
    + '</div>';
}


// ============================================================
// HELPER: "done" node HTML
// ============================================================
function doneNode(label, text, gobackFn) {
  return '<div class="node q-done" onclick="' + gobackFn + '"><b>' + label + ': ' + text + '</b><div class="goback">click to go back</div></div>';
}

function doneNodeWithChoice(label, text, choiceLabel, gobackFn) {
  return '<div class="node q-done" onclick="' + gobackFn + '"><b>' + label + ': ' + text + '</b><br><button class="opt picked">' + choiceLabel + '</button><div class="goback">click to go back</div></div>';
}


// ============================================================
// HELPER: "active" question node HTML
// ============================================================
function activeNode(label, text, buttons) {
  return '<div class="node q-active"><b>' + label + ': ' + text + '</b><br>' + buttons + '</div>';
}

function activeNodeWithCtx(label, text, ctx, buttons) {
  return '<div class="node q-active"><b>' + label + ': ' + text + '</b><div class="ctx">' + ctx + '</div>' + buttons + '</div>';
}


// ============================================================
// HELPER: "end" node HTML
// ============================================================
function endNodeActive(label, title, body) {
  return '<div class="node e-active"><b>' + label + ': ' + title + '</b><br>' + body + '</div>';
}

function endNodeOff(label) {
  return '<div class="node q-off">' + label + '</div>';
}


// ============================================================
// HELPER: Start Over button
// ============================================================
function startOverBtn() {
  return '<div class="center"><button class="nav" onclick="showBegin()">Start Over</button></div>';
}


// ============================================================
// HELPER: company size utilities
// ============================================================
function afterCompanyClose(size) {
  if (size === "large") return offMidCompany() + offSmallCompany();
  if (size === "mid") return offSmallCompany();
  return "";
}

function beforeCompany(size) {
  if (size === "large") return "";
  if (size === "mid") return offLargeCompany();
  return offLargeCompany() + offMidCompany();
}

function sizeLabel(size) {
  if (size === "large") return "Large (1,000+)";
  if (size === "mid") return "Mid sized (100 to 999)";
  return "Small or startup (under 100)";
}

function sizeQNum(size) {
  if (size === "large") return "Q6";
  if (size === "mid") return "Q7";
  return "Q8";
}

function sizeQText(size) {
  if (size === "large") return "Do you know anyone who works at this large company?";
  if (size === "mid") return "Do you know anyone who works at this mid sized company?";
  return "Do you know anyone who works at this small company?";
}

function sizeGoback(size) {
  if (size === "large") return "showQ6()";
  if (size === "mid") return "showQ7()";
  return "showQ8()";
}

function coldOff(size) {
  if (size === "large") return offColdLarge();
  if (size === "mid") return offColdMid();
  return offColdSmall();
}

function coldEndOffs(size) {
  if (size === "large") return endNodeOff("END G") + endNodeOff("END H") + endNodeOff("END I") + endNodeOff("END J");
  if (size === "mid") return endNodeOff("END K") + endNodeOff("END L") + endNodeOff("END M") + endNodeOff("END N");
  return endNodeOff("END O") + endNodeOff("END P") + endNodeOff("END Q");
}

function coldParentLabel(size) {
  if (size === "large") return "Q12";
  return "Q13";
}

function coldParentText(size) {
  if (size === "large") return "At a large company, who do you want to reach out to?";
  return "At a mid sized company, who do you want to reach out to?";
}

function coldParentGoback(size) {
  if (size === "large") return "showQ12()";
  return "showQ13()";
}


// ============================================================
// BEGIN SCREEN
// ============================================================
function showBegin() {
  activeMod = null;
  companySize = null;
  B.innerHTML = '<p class="intro">Networking is one of the most effective ways to job search, especially when your on paper experience does not neatly line up with the job you want. This interactive flowchart walks you through a series of questions and gives you a specific networking strategy based on your situation.</p>'
    + '<p class="intro">The entire flowchart is visible so you can see all possible paths. Your path will be highlighted as you go. Click any completed question to go back.</p>'
    + '<div class="center"><button class="big" onclick="showQ1()">Begin</button></div>';
}


// ============================================================
// Q1: Do you have an updated resume?
// ============================================================
function showQ1() {
  activeMod = null;
  companySize = null;
  var btns = '<button class="opt" onclick="q1_yes()">Yes</button>'
    + '<button class="opt" onclick="q1_no()">No</button>';

  B.innerHTML = activeNode("Q1", "Do you have an updated resume?", btns)
    + '<div class="child">'
    + endNodeOff("END A: Update Your Resume First")
    + '<div class="node q-off">Q2: Do you have a LinkedIn account?</div>'
    + '<div class="child">'
    + endNodeOff("END B: Create a LinkedIn Profile First")
    + '<div class="node q-off">Q3: Is there a specific open job you are interested in?</div>'
    + '<div class="child">'
    + offPathA()
    + offPathB()
    + '</div>'
    + '</div>'
    + '</div>';
  scrollToActive();
}

function q1_no() {
  B.innerHTML = doneNodeWithChoice("Q1", "Do you have an updated resume?", "No", "showQ1()")
    + '<div class="child">'
    + endNodeActive("END A", "Update Your Resume First", "You need an updated resume before networking. It doesn't need to be perfect, but many networking conversations end with &quot;send me your resume&quot; and you need to be ready for that. Get it to a decent state first, then come back.")
    + '<div class="node q-off">Q2: Do you have a LinkedIn account?</div>'
    + '<div class="child">'
    + endNodeOff("END B: Create a LinkedIn Profile First")
    + '<div class="node q-off">Q3: Is there a specific open job you are interested in?</div>'
    + '<div class="child">' + offPathA() + offPathB() + '</div>'
    + '</div>'
    + '</div>'
    + startOverBtn();
  scrollToActive();
}

function q1_yes() {
  showQ2();
}


// ============================================================
// Q2: Do you have a LinkedIn account?
// ============================================================
function showQ2() {
  var btns = '<button class="opt" onclick="q2_yes()">Yes</button>'
    + '<button class="opt" onclick="q2_no()">No</button>';

  B.innerHTML = doneNodeWithChoice("Q1", "Do you have an updated resume?", "Yes", "showQ1()")
    + '<div class="child">'
    + endNodeOff("END A: Update Your Resume First")
    + activeNode("Q2", "Do you have a LinkedIn account?", btns)
    + '<div class="child">'
    + endNodeOff("END B: Create a LinkedIn Profile First")
    + '<div class="node q-off">Q3: Is there a specific open job you are interested in?</div>'
    + '<div class="child">' + offPathA() + offPathB() + '</div>'
    + '</div>'
    + '</div>';
  scrollToActive();
}

function q2_no() {
  B.innerHTML = doneNodeWithChoice("Q1", "Do you have an updated resume?", "Yes", "showQ1()")
    + '<div class="child">'
    + endNodeOff("END A: Update Your Resume First")
    + doneNodeWithChoice("Q2", "Do you have a LinkedIn account?", "No", "showQ2()")
    + '<div class="child">'
    + endNodeActive("END B", "Create a LinkedIn Profile First", "Create a LinkedIn profile before you start networking. You need at minimum: your name, a photo, a headline, and your basic experience. LinkedIn is the primary platform where professional networking happens. Set one up, then come back.")
    + '<div class="node q-off">Q3: Is there a specific open job you are interested in?</div>'
    + '<div class="child">' + offPathA() + offPathB() + '</div>'
    + '</div>'
    + '</div>'
    + startOverBtn();
  scrollToActive();
}

function q2_yes() {
  showQ3();
}


// ============================================================
// Q3: Is there a specific open job?
// ============================================================
function showQ3() {
  var btns = '<button class="opt" onclick="q3_yes()">Yes</button>'
    + '<button class="opt" onclick="q3_no()">No</button>';

  B.innerHTML = doneNodeWithChoice("Q1", "Do you have an updated resume?", "Yes", "showQ1()")
    + '<div class="child">'
    + endNodeOff("END A: Update Your Resume First")
    + doneNodeWithChoice("Q2", "Do you have a LinkedIn account?", "Yes", "showQ2()")
    + '<div class="child">'
    + endNodeOff("END B: Create a LinkedIn Profile First")
    + activeNode("Q3", "Is there a specific open job you are interested in?", btns)
    + '<div class="child">' + offPathA() + offPathB() + '</div>'
    + '</div>'
    + '</div>';
  scrollToActive();
}

function q3_yes() {
  showQ4();
}

function q3_no() {
  showQ30();
}


// ============================================================
// HELPER: top of tree (Q1 done, Q2 done, Q3 done with choice)
// ============================================================
function treeTop(q3choice, q3goback) {
  return doneNodeWithChoice("Q1", "Do you have an updated resume?", "Yes", "showQ1()")
    + '<div class="child">'
    + endNodeOff("END A: Update Your Resume First")
    + doneNodeWithChoice("Q2", "Do you have a LinkedIn account?", "Yes", "showQ2()")
    + '<div class="child">'
    + endNodeOff("END B: Create a LinkedIn Profile First")
    + doneNodeWithChoice("Q3", "Is there a specific open job you are interested in?", q3choice, q3goback);
}

function treeTopClose() {
  return '</div></div>';
}


// ============================================================
// Q4: How did you find this job posting?
// ============================================================
function showQ4() {
  var btns = '<button class="opt" onclick="q4_linkedin()">LinkedIn Job Board</button>'
    + '<button class="opt" onclick="q4_feed()">LinkedIn Feed (someone posted)</button>'
    + '<button class="opt" onclick="q4_other()">Other Job Board</button>'
    + '<button class="opt" onclick="q4_event()">Career Fair, Event, or In Person</button>'
    + '<button class="opt" onclick="q4_recruiter()">A recruiter messaged me</button>';

  B.innerHTML = treeTop("Yes", "showQ3()")
    + '<div class="child">'
    + activeNode("Q4", "How did you find this job posting?", btns)
    + '<div class="child">'
    + modBoxOff()
    + endNodeOff("END C: A Recruiter Messaged You")
    + '<div class="node q-off">Q5: What is the company size?</div>'
    + '<div class="child">' + offLargeCompany() + offMidCompany() + offSmallCompany() + '</div>'
    + '</div>'
    + offPathB()
    + '</div>'
    + treeTopClose();
  scrollToActive();
}

function q4_linkedin() { activeMod = null; showQ5("LinkedIn Job Board"); }
function q4_feed() { activeMod = "m15"; showQ5("LinkedIn Feed (someone posted)"); }
function q4_other() { activeMod = null; showQ5("Other Job Board"); }
function q4_event() { activeMod = "m16"; showQ5("Career Fair, Event, or In Person"); }

function q4_recruiter() {
  activeMod = null;
  B.innerHTML = treeTop("Yes", "showQ3()")
    + '<div class="child">'
    + doneNodeWithChoice("Q4", "How did you find this job posting?", "A recruiter messaged me", "showQ4()")
    + '<div class="child">'
    + modBoxOff()
    + endNodeActive("END C", "A Recruiter Messaged You", "Respond within 24 hours. Express genuine interest and ask thoughtful questions about the role. They have already identified you as a potential fit. Be responsive, be curious, and ask about the role, team, and timeline. Do not immediately ask about salary in the first message.")
    + '<div class="node q-off">Q5: What is the company size?</div>'
    + '<div class="child">' + offLargeCompany() + offMidCompany() + offSmallCompany() + '</div>'
    + '</div>'
    + offPathB()
    + '</div>'
    + treeTopClose()
    + startOverBtn();
  scrollToActive();
}

// Store Q4 choice label for done nodes
var q4Label = "";


// ============================================================
// Q5: What is the company size?
// ============================================================
function showQ5(q4choice) {
  q4Label = q4choice;
  var btns = '<button class="opt" onclick="q5_large()">Large (1,000+)</button>'
    + '<button class="opt" onclick="q5_mid()">Mid sized (100 to 999)</button>'
    + '<button class="opt" onclick="q5_small()">Small or startup (under 100)</button>';

  B.innerHTML = treeTop("Yes", "showQ3()")
    + '<div class="child">'
    + doneNodeWithChoice("Q4", "How did you find this job posting?", q4Label, "showQ4()")
    + '<div class="child">'
    + modBox()
    + endNodeOff("END C: A Recruiter Messaged You")
    + activeNode("Q5", "What is the company size?", btns)
    + '<div class="child">' + offLargeCompany() + offMidCompany() + offSmallCompany() + '</div>'
    + '</div>'
    + offPathB()
    + '</div>'
    + treeTopClose();
  scrollToActive();
}

function q5_large() { companySize = "large"; showQ6(); }
function q5_mid() { companySize = "mid"; showQ7(); }
function q5_small() { companySize = "small"; showQ8(); }

// Helper: Q4+Q5 done prefix
function doneQ4Q5(q5choice, q5goback) {
  return treeTop("Yes", "showQ3()")
    + '<div class="child">'
    + doneNodeWithChoice("Q4", "How did you find this job posting?", q4Label, "showQ4()")
    + '<div class="child">'
    + modBox()
    + endNodeOff("END C: A Recruiter Messaged You")
    + doneNodeWithChoice("Q5", "What is the company size?", q5choice, q5goback)
    + '<div class="child">';
}

function doneQ4Q5Close() {
  return '</div></div>' + offPathB() + '</div>' + treeTopClose();
}

function showQ5Again() {
  showQ5(q4Label);
}


// ============================================================
// Q6: Do you know anyone at this large company?
// ============================================================
function showQ6() {
  var btns = '<button class="opt" onclick="q6_yes()">Yes</button>'
    + '<button class="opt" onclick="q6_no()">No</button>';

  B.innerHTML = doneQ4Q5("Large (1,000+)", "showQ5Again()")
    + activeNode("Q6", "Do you know anyone who works at this large company?", btns)
    + '<div class="child">' + offWarmBranch() + offColdLarge() + '</div>'
    + offMidCompany()
    + offSmallCompany()
    + doneQ4Q5Close();
  scrollToActive();
}

function q6_yes() { showQ9_large(); }
function q6_no() { showQ12(); }


// ============================================================
// Q7: Do you know anyone at this mid sized company?
// ============================================================
function showQ7() {

function q35_large() { pathBEndHelper("Sometime in the future", "Q35", "showQ35()", "Large", "END AA", "Long-Term, Large Company", "Build genuine connections over time with no immediate ask. Engage with company and employee posts regularly. Attend their public events or webinars. The messaging should be relaxed and based around your genuine interest in the company. This kind of networking pays off months or years later. Another benefit: if you see a position open and think of someone who is a good fit, you can refer them to your new contact."); }

function q40_linkedin() { q40EndHelper("Growing LinkedIn connections", "END DD", "Grow LinkedIn Connections", "Connect with 5 to 10 people per week in your industry. Personalize every connection request, even briefly. Engage with others' content before requesting a connection. Post or share content 1 to 2 times per week to stay visible. Quality matters more than quantity, but consistency is key."); }
function q40_mentors() { q40EndHelper("Finding mentors", "END EE", "Find Mentors", 'Identify 2 to 3 people whose career path you admire and reach out with a specific, respectful ask. Do not ask "Will you be my mentor?" That is too big an ask upfront. Instead, ask for a 15 minute conversation (a coffee chat). Prepare 3 to 4 specific questions. Follow up with a thank you and what you learned. Mentorship often develops naturally from repeated conversations.'); }
